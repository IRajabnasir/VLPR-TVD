<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <style>
    .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
    .subtitle { font-size: 13px; fill: #475569; }
    .actor-head { fill: none; stroke: #0f172a; stroke-width: 2; stroke-linecap: round; }
    .actor-label { font-size: 13px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
    .obj-box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; }
    .obj-label { font-size: 13px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
    .lifeline { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4 4; }
    .activation { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.2; }
    .msg-line { stroke: #334155; stroke-width: 1.6; fill: none; }
    .ret-line { stroke: #334155; stroke-width: 1.2; stroke-dasharray: 4 3; fill: none; }
    .msg-label { font-size: 12px; fill: #0f172a; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="open-arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="#334155" stroke-width="1.2"/>
    </marker>
  </defs>

  <text x="550" y="32" class="title" text-anchor="middle">Sequence Diagram — Detect Violation</text>
  <text x="550" y="52" class="subtitle" text-anchor="middle">Admin → Login → Dashboard → Start Camera → Analyze Frame → Save → Acknowledge</text>

  <!-- Participants: Admin, ReactUI, Django API, AI Module, Database -->
  <!-- Admin actor -->
  <g transform="translate(100,95)">
    <circle cx="0" cy="0" r="12" class="actor-head"/>
    <line x1="0" y1="12" x2="0" y2="40" class="actor-head"/>
    <line x1="-18" y1="25" x2="18" y2="25" class="actor-head"/>
    <line x1="0" y1="40" x2="-14" y2="65" class="actor-head"/>
    <line x1="0" y1="40" x2="14" y2="65" class="actor-head"/>
    <text x="0" y="90" class="actor-label">Admin</text>
  </g>
  <line x1="100" y1="105" x2="100" y2="640" class="lifeline"/>

  <!-- ReactUI -->
  <rect x="225" y="80" width="150" height="40" class="obj-box"/>
  <text x="300" y="105" class="obj-label">:ReactUI</text>
  <line x1="300" y1="120" x2="300" y2="640" class="lifeline"/>

  <!-- Django API -->
  <rect x="460" y="80" width="150" height="40" class="obj-box"/>
  <text x="535" y="105" class="obj-label">:DjangoAPI</text>
  <line x1="535" y1="120" x2="535" y2="640" class="lifeline"/>

  <!-- AI Module -->
  <rect x="695" y="80" width="150" height="40" class="obj-box"/>
  <text x="770" y="105" class="obj-label">:AIModel</text>
  <line x1="770" y1="120" x2="770" y2="640" class="lifeline"/>

  <!-- Database -->
  <rect x="930" y="80" width="140" height="40" class="obj-box"/>
  <text x="1000" y="105" class="obj-label">:Database</text>
  <line x1="1000" y1="120" x2="1000" y2="640" class="lifeline"/>

  <!-- Activations (small bars on lifelines) -->
  <rect x="296" y="165" width="8" height="445" class="activation"/>
  <rect x="531" y="200" width="8" height="370" class="activation"/>
  <rect x="766" y="345" width="8" height="120" class="activation"/>
  <rect x="996" y="245" width="8" height="270" class="activation"/>

  <!-- Messages -->
  <!-- 1. Admin -> UI : enter credentials -->
  <line x1="110" y1="170" x2="290" y2="170" class="msg-line" marker-end="url(#arrow)"/>
  <text x="120" y="163" class="msg-label">1: Enter credentials</text>

  <!-- 2. UI -> API : POST /api/auth/login/ -->
  <line x1="310" y1="205" x2="525" y2="205" class="msg-line" marker-end="url(#arrow)"/>
  <text x="320" y="198" class="msg-label">2: POST /api/auth/login/</text>

  <!-- 3. API -> DB : verify user -->
  <line x1="545" y1="250" x2="990" y2="250" class="msg-line" marker-end="url(#arrow)"/>
  <text x="555" y="243" class="msg-label">3: verify user &amp; password hash</text>

  <!-- 4. DB -> API : ok -->
  <line x1="990" y1="290" x2="545" y2="290" class="ret-line" marker-end="url(#open-arrow)"/>
  <text x="650" y="283" class="msg-label">4: user row</text>

  <!-- 5. API -> UI : access + refresh tokens -->
  <line x1="525" y1="320" x2="310" y2="320" class="ret-line" marker-end="url(#open-arrow)"/>
  <text x="330" y="313" class="msg-label">5: { access, refresh }</text>

  <!-- 6. UI -> API : POST /api/analyze/ (image) -->
  <line x1="310" y1="350" x2="525" y2="350" class="msg-line" marker-end="url(#arrow)"/>
  <text x="320" y="343" class="msg-label">6: POST /api/analyze/ (frame)</text>

  <!-- 7. API -> AI : analyze_image(path) -->
  <line x1="545" y1="390" x2="760" y2="390" class="msg-line" marker-end="url(#arrow)"/>
  <text x="555" y="383" class="msg-label">7: analyze_image(path)</text>

  <!-- 8. AI -> API : {plate, evidence} -->
  <line x1="760" y1="450" x2="545" y2="450" class="ret-line" marker-end="url(#open-arrow)"/>
  <text x="555" y="443" class="msg-label">8: { plate, evidence_url }</text>

  <!-- 9. API -> DB : create Vehicle, Violation, Evidence -->
  <line x1="545" y1="490" x2="990" y2="490" class="msg-line" marker-end="url(#arrow)"/>
  <text x="555" y="483" class="msg-label">9: INSERT vehicle / violation / evidence</text>

  <!-- 10. DB -> API : saved ids -->
  <line x1="990" y1="520" x2="545" y2="520" class="ret-line" marker-end="url(#open-arrow)"/>
  <text x="700" y="513" class="msg-label">10: ids</text>

  <!-- 11. API -> UI : ViolationSerializer.data -->
  <line x1="525" y1="560" x2="310" y2="560" class="ret-line" marker-end="url(#open-arrow)"/>
  <text x="330" y="553" class="msg-label">11: 201 Created, violation JSON</text>

  <!-- 12. UI -> Admin : show result + redirect -->
  <line x1="290" y1="600" x2="110" y2="600" class="ret-line" marker-end="url(#open-arrow)"/>
  <text x="120" y="593" class="msg-label">12: Show violation, go to /violations</text>
</svg>
