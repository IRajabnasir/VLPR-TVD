<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 720" font-family="Helvetica, Arial, sans-serif" font-size="14">
  <style>
    .title { font-size: 20px; font-weight: bold; fill: #0f172a; }
    .subtitle { font-size: 13px; fill: #475569; }
    .state { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 12; }
    .reject { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; }
    .state-label { font-size: 15px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
    .edge { stroke: #334155; stroke-width: 1.8; fill: none; }
    .reject-edge { stroke: #dc2626; stroke-width: 1.5; stroke-dasharray: 4 4; fill: none; }
    .edge-label { font-size: 12px; fill: #475569; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-r" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <text x="350" y="35" class="title" text-anchor="middle">State Chart Diagram — Violation Lifecycle</text>
  <text x="350" y="55" class="subtitle" text-anchor="middle">Idle → Detected → Stored → Reviewed → Completed</text>

  <!-- Initial state (filled circle) -->
  <circle cx="350" cy="95" r="8" fill="#0f172a"/>

  <!-- Idle -->
  <rect x="280" y="125" width="140" height="48" class="state"/>
  <text x="350" y="154" class="state-label">Idle</text>

  <!-- Detected -->
  <rect x="280" y="220" width="140" height="48" class="state"/>
  <text x="350" y="249" class="state-label">Detected</text>

  <!-- Stored -->
  <rect x="280" y="315" width="140" height="48" class="state"/>
  <text x="350" y="344" class="state-label">Stored</text>

  <!-- Reviewed -->
  <rect x="280" y="410" width="140" height="48" class="state"/>
  <text x="350" y="439" class="state-label">Reviewed</text>

  <!-- Completed -->
  <rect x="280" y="505" width="140" height="48" class="state"/>
  <text x="350" y="534" class="state-label">Completed</text>

  <!-- Final state (bulls-eye) -->
  <circle cx="350" cy="600" r="10" fill="none" stroke="#0f172a" stroke-width="2"/>
  <circle cx="350" cy="600" r="5" fill="#0f172a"/>

  <!-- Rejected (off to the side) -->
  <rect x="510" y="315" width="140" height="48" class="state reject"/>
  <text x="580" y="344" class="state-label" fill="#dc2626">Rejected</text>

  <!-- Edges main path -->
  <line x1="350" y1="103" x2="350" y2="123" class="edge" marker-end="url(#arrow)"/>

  <line x1="350" y1="173" x2="350" y2="218" class="edge" marker-end="url(#arrow)"/>
  <text x="360" y="200" class="edge-label">AI detects helmet violation</text>

  <line x1="350" y1="268" x2="350" y2="313" class="edge" marker-end="url(#arrow)"/>
  <text x="360" y="295" class="edge-label">Save to DB</text>

  <line x1="350" y1="363" x2="350" y2="408" class="edge" marker-end="url(#arrow)"/>
  <text x="360" y="390" class="edge-label">Admin opens record</text>

  <line x1="350" y1="458" x2="350" y2="503" class="edge" marker-end="url(#arrow)"/>
  <text x="360" y="485" class="edge-label">Admin finalizes</text>

  <line x1="350" y1="553" x2="350" y2="590" class="edge" marker-end="url(#arrow)"/>

  <!-- Reject edge from Stored/Reviewed -->
  <path d="M 420 339 L 510 339" class="reject-edge" marker-end="url(#arrow-r)"/>
  <text x="430" y="330" class="edge-label" fill="#dc2626">Admin rejects</text>

  <path d="M 420 434 C 480 434, 540 390, 580 363" class="reject-edge" marker-end="url(#arrow-r)"/>
</svg>
